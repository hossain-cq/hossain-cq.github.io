# News & Updates shown on /news/, in display order (newest first).
# Add a new entry at the top to publish an update — no HTML editing required.
#
# Fields:
#   type      (required) short tag, e.g. "Preprint", "Publication", "In progress", "Talk"
#   headline  (required) the bold headline line
#   body      (required) supporting sentence(s); may include inline HTML like <strong>
#   link_url  (optional) outbound link (DOI, arXiv, etc.)
#   link_text (optional) link label; defaults to "Read more →" if link_url is set
#   featured  (optional) true -> highlights the entry with an accent border
#   muted     (optional) true -> renders the type tag as a dashed/in-progress style

